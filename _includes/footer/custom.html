<div class="theme-switch">
  <label for="theme-select">
    <span class="theme-switch__label">Color scheme</span>
    <select id="theme-select">
      <option value="system">System</option>
      <option value="light">Light</option>
      <option value="dark">Dark</option>
    </select>
  </label>
</div>

<script>
  (function () {
    var STORAGE_KEY = 'theme-preference';
    var select = document.getElementById('theme-select');
    if (!select) return;

    select.value = localStorage.getItem(STORAGE_KEY) || 'dark';

    select.addEventListener('change', function () {
      localStorage.setItem(STORAGE_KEY, select.value);
      if (window.__applyThemePreference) window.__applyThemePreference(select.value);
    });

    window.matchMedia('(prefers-color-scheme: light)').addEventListener('change', function () {
      var pref = localStorage.getItem(STORAGE_KEY) || 'dark';
      if (pref === 'system' && window.__applyThemePreference) window.__applyThemePreference('system');
    });
  })();
</script>

<!-- end custom footer snippets -->
